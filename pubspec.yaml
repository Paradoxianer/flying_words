name: flying_words
description: A game where you have to pic the right word out of many flyings words.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  audioplayers: ^6.8.1
  cupertino_icons: ^1.0.2
  go_router: ^17.3.0
  logging: ^1.1.0
  provider: ^6.0.2
  shared_preferences: ^2.0.13

  # If you don't need one of the following dependencies,
  # delete the relevant line below, and get rid of any Dart code
  # that references the dependency.
  firebase_core: ^4.11.0  # Needed for Crashlytics below
  firebase_crashlytics: ^5.2.4  # Error reporting
  games_services: ^5.1.0  # Achievements and leaderboards
  google_mobile_ads: ^9.0.0  # Ads
  in_app_purchase: ^3.0.1  # In-app purchases
  quiver: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  test: ^1.19.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/marker/
    - assets/music/
    - assets/sfx/
    - assets/verses/

  fonts:
    - family: Cormorant Garamond
      fonts:
        - asset: assets/fonts/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantGaramond-Bold.ttf
          weight: 700
    - family: Source Serif 4
      fonts:
        - asset: assets/fonts/SourceSerif4-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceSerif4-SemiBold.ttf
          weight: 600

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#F2E7CF"
  adaptive_icon_foreground: "assets/icon-adaptive-foreground.png"
